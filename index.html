<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאתר רכב ישראלי - גרסה חסינה</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #f3f4f6; --text: #1f2937; }
        body { font-family: system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; direction: rtl; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 12px; font-size: 20px; text-align: center; box-sizing: border-box; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--primary); color: white; }
        #result { display: none; background: #f9fafb; padding: 15px; border-radius: 12px; text-align: right; border: 1px solid #eee; }
        .loader { display: none; color: var(--primary); margin: 10px; font-weight: bold; }
        .error { display: none; color: #ef4444; background: #fee2e2; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
        .data-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 איתור רכב מהיר</h2>
    <input type="number" id="lp" placeholder="הכנס מספר רכב" inputmode="numeric">
    <div class="btn-row">
        <button onclick="searchCar()">חפש נתונים</button>
        <button style="background:#f59e0b" onclick="startScan()">📷 סריקה</button>
    </div>

    <div id="loader" class="loader">מתחבר למאגר...</div>
    <div id="error" class="error"></div>

    <div id="result">
        <div class="data-item"><span>יצרן:</span> <b id="b"></b></div>
        <div class="data-item"><span>דגם:</span> <b id="m"></b></div>
        <div class="data-item"><span>שנה:</span> <b id="y"></b></div>
        <div class="data-item"><span>טסט:</span> <b id="t"></b></div>
    </div>
</div>

<script>
    async function searchCar() {
        const lp = document.getElementById('lp').value;
        if (!lp) return;

        const loader = document.getElementById('loader');
        const err = document.getElementById('error');
        const res = document.getElementById('result');

        loader.style.display = 'block';
        err.style.display = 'none';
        res.style.display = 'none';

        // המאגר הממשלתי הרשמי
        const resourceId = '053ad243-5e8b-421d-ad85-a3a403e3131d';
        
        // אנחנו מנסים 2 פרוקסים שונים במקביל - מי שעונה ראשון מנצח
        const proxy1 = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://data.gov.il/api/3/action/datastore_search?resource_id=${resourceId}&q=${lp}`)}`;
        const proxy2 = `https://corsproxy.io/?${encodeURIComponent(`https://data.gov.il/api/3/action/datastore_search?resource_id=${resourceId}&filters={"mispar_rechev":"${lp}"}`)}`;

        try {
            let carData = null;

            // נסיון עם פרוקסי ראשון
            try {
                const response = await fetch(proxy1);
                const data = await response.json();
                const parsed = JSON.parse(data.contents);
                carData = parsed.result.records[0];
            } catch (e) {
                console.log("Proxy 1 failed, trying Proxy 2...");
                // נסיון עם פרוקסי שני
                const response = await fetch(proxy2);
                const parsed = await response.json();
                carData = parsed.result.records[0];
            }

            if (carData) {
                document.getElementById('b').innerText = carData.tozeret_nm;
                document.getElementById('m').innerText = carData.kinuy_mishkari;
                document.getElementById('y').innerText = carData.shnat_yitzur;
                document.getElementById('t').innerText = carData.tokef_test;
                res.style.display = 'block';
            } else {
                throw new Error("הרכב לא נמצא");
            }
        } catch (e) {
            err.innerText = "המאגר הממשלתי לא מגיב. נסה שוב בעוד דקה (ייתכן עומס)";
            err.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    }

    // פונקציית סריקה בסיסית (ללא שינוי מהותי)
    function startScan() {
        alert("פונקציית הסריקה תופעל בגרסה הבאה אחרי שנפתור את התקשורת");
    }
</script>
</body>
</html>
