<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאתר רכב ישראלי Pro - גרסה יציבה</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #f59e0b;
            --success: #10b981;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 { font-size: 22px; color: var(--text); margin-bottom: 20px; }

        .search-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 20px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        .btn-main-group { display: flex; gap: 8px; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.97); }

        .btn-search { background: var(--primary); color: white; }
        .btn-scan { background: var(--secondary); color: white; }
        .btn-share { background: var(--success); color: white; width: 100%; margin-top: 15px; }

        #scanner-container {
            display: none;
            margin-top: 15px;
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        video { width: 100%; display: block; }
        .snap-btn {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        #result-card {
            display: none;
            text-align: right;
            background: #f9fafb;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #edf2f7;
        }

        .data-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; }
        .data-row:last-child { border: none; }
        .data-label { color: #6b7280; font-size: 14px; }
        .data-val { font-weight: bold; color: var(--text); }

        .history-box {
            margin-top: 25px;
            text-align: right;
        }

        .hist-item {
            background: #fff;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-top: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        #status-msg { display: none; margin: 15px 0; color: var(--primary); font-size: 14px; }
        #error-msg { display: none; color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🚗 סורק רכב ישראל</h1>

    <div class="search-section">
        <input type="number" id="lpInput" placeholder="הכנס מספר רכב" inputmode="numeric">
        <div class="btn-main-group">
            <button class="btn-search" onclick="fetchVehicle()">חיפוש</button>
            <button class="btn-scan" onclick="openCamera()">📷 סריקה</button>
        </div>
    </div>

    <div id="scanner-container">
        <video id="video" playsinline></video>
        <button class="snap-btn" onclick="capturePhoto()">צלם מספר</button>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div id="status-msg">טוען...</div>
    <div id="error-msg"></div>

    <div id="result-card">
        <div class="data-row"><span class="data-label">יצרן:</span> <span class="data-val" id="v_brand"></span></div>
        <div class="data-row"><span class="data-label">דגם:</span> <span class="data-val" id="v_model"></span></div>
        <div class="data-row"><span class="data-label">שנה:</span> <span class="data-val" id="v_year"></span></div>
        <div class="data-row"><span class="data-label">צבע:</span> <span class="data-val" id="v_color"></span></div>
        <div class="data-row"><span class="data-label">טסט בתוקף:</span> <span class="data-val" id="v_test"></span></div>
        <button class="btn-share" onclick="shareToWa()">שתף בוואטסאפ</button>
    </div>

    <div class="history-box">
        <p style="font-size: 14px; color: #9ca3af; margin-bottom: 5px;">חיפושים אחרונים:</p>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const RID = '053ad243-5e8b-421d-ad85-a3a403e3131d';
    let currentData = null;
    let cameraStream = null;

    window.onload = renderHistory;

    // פונקציית החיפוש המשודרגת
    async function fetchVehicle(manualLp = null) {
        const lp = manualLp || document.getElementById('lpInput').value.trim();
        if (!lp) return;

        updateStatus(true, "מתחבר למאגר הממשלתי...");
        showError(null);
        document.getElementById('result-card').style.display = 'none';

        // מנסה שתי שיטות שליפה במקביל כדי לעקוף חסימות
        const directUrl = `https://data.gov.il/api/3/action/datastore_search?resource_id=${RID}&q=${lp}`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(directUrl)}`;

        try {
            let records = [];
            
            // נסיון 1: ישיר (מהיר יותר אם עובד)
            try {
                const res = await fetch(directUrl);
                const json = await res.json();
                records = json.result.records;
            } catch (e) { console.log("Direct fetch failed, using proxy..."); }

            // נסיון 2: דרך פרוקסי (אם הישיר נחסם)
            if (records.length === 0) {
                const res = await fetch(proxyUrl);
                const json = await res.json();
                const content = JSON.parse(json.contents);
                records = content.result.records;
            }

            // סינון תוצאה מדויקת
            const car = records.find(r => String(r.mispar_rechev).includes(lp));

            if (car) {
                currentData = car;
                showData(car);
                addToHistory(lp, car.tozeret_nm);
            } else {
                showError("הרכב לא נמצא במאגר. בדוק את המספר.");
            }
        } catch (err) {
            showError("שגיאת תקשורת זמנית. נסה שוב.");
        } finally {
            updateStatus(false);
        }
    }

    function showData(car) {
        document.getElementById('v_brand').innerText = car.tozeret_nm;
        document.getElementById('v_model').innerText = car.kinuy_mishkari;
        document.getElementById('v_year').innerText = car.shnat_yitzur;
        document.getElementById('v_color').innerText = car.tzeva_rechev;
        document.getElementById('v_test').innerText = car.tokef_test;
        document.getElementById('result-card').style.display = 'block';
    }

    // מצלמה וסריקה
    async function openCamera() {
        const container = document.getElementById('scanner-container');
        const video = document.getElementById('video');
        container.style.display = 'block';
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = cameraStream;
            video.play();
        } catch (e) { showError("אין גישה למצלמה"); }
    }

    async function capturePhoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        cameraStream.getTracks().forEach(t => t.stop());
        document.getElementById('scanner-container').style.display = 'none';
        
        updateStatus(true, "מפענח מספר...");
        try {
            const out = await Tesseract.recognize(canvas.toDataURL(), 'eng');
            const num = out.data.text.replace(/\D/g, '');
            if (num.length >= 7) {
                document.getElementById('lpInput').value = num;
                fetchVehicle(num);
            } else { showError("לא זוהה מספר תקין"); }
        } catch (e) { showError("שגיאה בעיבוד התמונה"); }
        finally { updateStatus(false); }
    }

    // עזרים
    function shareToWa() {
        const t = `רכב ${currentData.mispar_rechev}: ${currentData.tozeret_nm} ${currentData.kinuy_mishkari}, שנת ${currentData.shnat_yitzur}. טסט עד: ${currentData.tokef_test}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }

    function addToHistory(lp, name) {
        let h = JSON.parse(localStorage.getItem('car_h') || '[]');
        h = h.filter(x => x.lp !== lp);
        h.unshift({lp, name});
        localStorage.setItem('car_h', JSON.stringify(h.slice(0, 5)));
        renderHistory();
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('car_h') || '[]');
        document.getElementById('historyList').innerHTML = h.map(x => `
            <div class="hist-item" onclick="fetchVehicle('${x.lp}')">
                <b>${x.lp}</b> <span>${x.name}</span>
            </div>
        `).join('');
    }

    function updateStatus(s, t = "") {
        const m = document.getElementById('status-msg');
        m.innerText = t;
        m.style.display = s ? 'block' : 'none';
    }

    function showError(m) {
        const e = document.getElementById('error-msg');
        if(m) { e.innerText = m; e.style.display = 'block'; }
        else { e.style.display = 'none'; }
    }
</script>
</body>
</html>
